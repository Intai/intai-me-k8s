- name: Set up KVM and provision VMs
  hosts: hosts
  become: true
  roles:
    - role: kvm_host
      tags: [kvm]
    - role: vm_provision
      tags: [vm]

- name: Generate WireGuard keys on all hosts
  hosts: hosts
  become: true
  tags: [wireguard]
  tasks:
    - name: Generate WireGuard keys
      ansible.builtin.include_role:
        name: wireguard
        tasks_from: generate_keys

- name: Configure WireGuard mesh (requires all keys)
  hosts: hosts
  become: true
  serial: 1
  tags: [wireguard]
  tasks:
    - name: Configure WireGuard
      ansible.builtin.include_role:
        name: wireguard
        tasks_from: configure

- name: Set up port forwarding
  hosts: hosts
  become: true
  roles:
    - role: port_forward
      tags: [port_forward]
