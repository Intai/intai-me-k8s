- name: Fetch kubeconfig from K8s control plane
  hosts: hosts
  serial: 1
  become: true
  tasks:
    - name: Add VM to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ node_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: packer
        ansible_ssh_private_key_file: "{{ ansible_ssh_private_key_file | regex_replace('\\.pub$', '') }}"
        groups:
          - k8s_nodes

    - name: Copy admin.conf from VM
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ playbook_dir }}/../kubeconfig"
        flat: true
      delegate_to: "{{ node_name }}"
      run_once: true
      vars:
        ansible_ssh_common_args: "-o ProxyJump={{ hostvars[inventory_hostname].ansible_user }}@{{ hostvars[inventory_hostname].ansible_host }}"
        ansible_become_flags: "-n"

    - name: Rewrite kubeconfig server URL to public IP
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../kubeconfig"
        regexp: 'server: https://.*:6443'
        replace: "server: https://{{ ansible_host }}:6443"
      delegate_to: localhost
      become: false

    - name: Rename entries in fetched kubeconfig
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../kubeconfig"
        regexp: "{{ item.from }}"
        replace: "{{ item.to }}"
      loop:
        - { from: 'kubernetes-admin@cluster.local', to: 'intai-me-k8s' }
        - { from: 'cluster.local', to: 'intai-me-k8s' }
        - { from: 'kubernetes-admin', to: 'intai-me-k8s-admin' }
      delegate_to: localhost
      become: false

    - name: Back up existing kubeconfig
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.kube/config"
        dest: "{{ lookup('env', 'HOME') }}/.kube/config.bak"
        remote_src: true
        mode: "0600"
      delegate_to: localhost
      become: false

    - name: Merge kubeconfig into ~/.kube/config
      ansible.builtin.shell:
        cmd: >
          KUBECONFIG={{ playbook_dir }}/../kubeconfig:{{ lookup('env', 'HOME') }}/.kube/config
          kubectl config view --flatten > {{ lookup('env', 'HOME') }}/.kube/config.merged
          && mv {{ lookup('env', 'HOME') }}/.kube/config.merged {{ lookup('env', 'HOME') }}/.kube/config
      delegate_to: localhost
      become: false
