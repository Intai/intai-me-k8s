- name: Clear stale host keys from local known_hosts
  hosts: all
  gather_facts: false
  connection: local
  serial: 1
  tasks:
    - name: Extract jump host from ProxyJump config
      ansible.builtin.set_fact:
        jump_host: "{{ ansible_ssh_common_args | regex_search('ProxyJump=\\S+@(\\S+)', '\\1') | first }}"
      vars:
        ansible_become: false

    - name: Remove old host key for jump host
      ansible.builtin.known_hosts:
        name: "{{ jump_host }}"
        state: absent
      delegate_to: localhost
      vars:
        ansible_become: false

    - name: Remove old host key for VM IP
      ansible.builtin.known_hosts:
        name: "{{ ansible_host }}"
        state: absent
      delegate_to: localhost
      vars:
        ansible_become: false

- name: Install Kubernetes
  ansible.builtin.import_playbook: kubernetes_sigs.kubespray.cluster

