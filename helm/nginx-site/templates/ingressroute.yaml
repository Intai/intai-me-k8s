apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.domain }}`) || Host(`www.{{ .Values.domain }}`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-redirect-www
      services:
        - name: {{ .Release.Name }}
          port: 80
  tls:
    secretName: {{ .Release.Name }}-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.domain }}`) || Host(`www.{{ .Values.domain }}`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-redirect-https
      services:
        - name: {{ .Release.Name }}
          port: 80
